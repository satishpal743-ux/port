<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satish | AI & Machine Learning Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; /* Deep Navy */
            --accent: #3b82f6;  /* Bright Blue */
            --text-main: #1e293b;
            --text-sub: #64748b;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { scroll-behavior: smooth; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f1f5f9; color: var(--text-main); }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

        /* Navigation */
        nav {
            position: sticky; top: 0; background: var(--glass); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 10%; z-index: 1000; border-bottom: 1px solid #e2e8f0;
        }
        nav a { text-decoration: none; color: var(--text-main); font-weight: 600; margin-left: 2rem; transition: 0.3s; }
        nav a:hover { color: var(--accent); }

        /* Hero Section */
        .hero {
            height: 80vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; background: white;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 30px 30px;
        }
        .hero h1 { font-size: 4rem; margin: 0; letter-spacing: -2px; }
        .hero p { font-size: 1.5rem; color: var(--text-sub); margin-top: 1rem; }

        /* Section Universal Layout */
        section { padding: 100px 10%; }
        .section-title { font-size: 2.5rem; margin-bottom: 3rem; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        
        /* Professional Cards */
        .card {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #e2e8f0;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card h3 { color: var(--accent); margin-top: 0; }

        /* Achievements Styling */
        .achievement-item {
            border-left: 3px solid var(--accent); padding-left: 1.5rem; margin-bottom: 1.5rem;
        }

        /* Contact Form */
        .contact-box {
            max-width: 600px; margin: 0 auto; background: var(--primary); color: white;
            padding: 3rem; border-radius: 30px;
        }
        input, textarea {
            width: 100%; padding: 1rem; margin: 10px 0; border-radius: 10px; border: none;
            background: rgba(255,255,255,0.1); color: white;
        }
        button {
            width: 100%; padding: 1rem; border-radius: 10px; border: none;
            background: var(--accent); color: white; font-weight: bold; cursor: pointer;
        }

        footer { text-align: center; padding: 3rem; background: white; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <nav>
        <div style="font-size: 1.5rem; font-weight: 800;">S.P.</div>
        <div>
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#experience">Experience</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <h1 id="user-name">Satish</h1>
        <p id="user-major">B.Sc. AIML Enthusiast</p>
        <div style="margin-top: 2rem;">
            <a href="#contact" style="background: var(--primary); color:white; padding: 1rem 2rem; border-radius: 50px; text-decoration: none;">Get In Touch</a>
        </div>
    </header>

    <section id="about">
        <div class="grid">
            <div class="card">
                <h2>Bio</h2>
                <p id="user-about">Loading profile from TiDB...</p>
            </div>
            <div class="card">
                <h2>Core Expertise</h2>
                <div id="user-skills"></div>
            </div>
        </div>
    </section>

    <section id="projects" style="background: white;">
        <h2 class="section-title">Featured Projects</h2>
        <div class="grid" id="project-list">
            </div>
    </section>

    <section id="experience">
        <h2 class="section-title">Professional Milestones</h2>
        <div class="grid">
            <div class="card">
                <h3>Work Experience</h3>
                <div id="user-exp"></div>
            </div>
            <div class="card">
                <h3>Achievements</h3>
                <div id="user-achievements"></div>
            </div>
        </div>
    </section>

    <section id="contact">
        <div class="contact-box">
            <h2 style="color: white; text-align: center;">Let's Collaborate</h2>
            <form action="/api/contact" method="POST">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <textarea name="message" rows="5" placeholder="Project Details..." required></textarea>
                <button type="submit">Deploy Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Satish | 2nd Sem B.Sc. AIML | Powered by TiDB Cloud</p>
    </footer>

    <script>
        fetch('/api/profile')
            .then(res => res.json())
            .then(data => {
                document.getElementById('user-name').innerText = data.name;
                document.getElementById('user-major').innerText = data.major;
                document.getElementById('user-about').innerText = data.about_me;

                // Skills
                const skillsDiv = document.getElementById('user-skills');
                data.skills.split(',').forEach(s => {
                    skillsDiv.innerHTML += `<span style="display:inline-block; background:#eee; padding:5px 15px; margin:5px; border-radius:20px;">${s}</span>`;
                });

                // Experience
                const expDiv = document.getElementById('user-exp');
                data.experience.split('|').forEach(e => {
                    expDiv.innerHTML += `<div class="achievement-item">${e}</div>`;
                });

                // Achievements
                const achDiv = document.getElementById('user-achievements');
                data.achievements.split('|').forEach(a => {
                    achDiv.innerHTML += `<div class="achievement-item">${a}</div>`;
                });

                // Projects
                const projDiv = document.getElementById('project-list');
                data.projects.split('|').forEach(p => {
                    projDiv.innerHTML += `<div class="card"><h3>${p}</h3><p>Built using advanced AI/ML algorithms and optimized data structures.</p></div>`;
                });
            });
    </script>
</body>
</html>
