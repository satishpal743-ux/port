<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satish | AI & ML Engineer Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --text: #1e293b; }
        * { scroll-behavior: smooth; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f1f5f9; color: var(--text); }
        
        nav { position: sticky; top: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; padding: 1rem 10%; z-index: 100; border-bottom: 1px solid #e2e8f0; }
        nav a { text-decoration: none; color: var(--text); font-weight: 600; margin-left: 20px; }

        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: white; border-bottom: 1px solid #e2e8f0; }
        .hero h1 { font-family: 'Space Grotesk'; font-size: 4rem; margin: 0; color: var(--primary); }
        
        section { padding: 80px 10%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
        
        .skill-tag { display: inline-block; background: #dbeafe; color: #1e40af; padding: 5px 15px; border-radius: 20px; margin: 5px; font-size: 0.85rem; font-weight: 600; }
        .milestone { border-left: 3px solid var(--accent); padding-left: 15px; margin-bottom: 20px; }

        .contact-card { max-width: 600px; margin: 0 auto; background: var(--primary); color: white; padding: 3rem; border-radius: 25px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        #statusMsg { margin-top: 15px; text-align: center; font-weight: 600; transition: all 0.3s; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 800; font-size: 1.2rem;">SATISH.AI</div>
    <div><a href="#about">About</a><a href="#projects">Projects</a><a href="#contact">Contact</a></div>
</nav>

<header class="hero">
    <h1 id="name">Satish</h1>
    <p id="major" style="font-size: 1.5rem; color: #64748b;">B.Sc. AIML Student</p>
</header>

<section id="about">
    <div class="grid">
        <div class="card">
            <h2>About Me</h2>
            <p id="bio">Loading...</p>
        </div>
        <div class="card">
            <h2>Technical Stack</h2>
            <div id="skills"></div>
        </div>
    </div>
</section>

<section id="projects" style="background: #fff;">
    <h2 style="text-align: center; font-size: 2.5rem; margin-bottom: 40px;">Projects & Experience</h2>
    <div class="grid">
        <div class="card">
            <h3>Milestones</h3>
            <div id="achievements"></div>
        </div>
        <div class="card">
            <h3>Experience</h3>
            <div id="experience"></div>
        </div>
    </div>
</section>

<section id="contact">
    <div class="contact-card">
        <h2 style="color: white; margin-top: 0;">Let's Connect</h2>
        <form id="contactForm">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" rows="4" placeholder="Message" required></textarea>
            <button type="submit" id="submitBtn">Send Message</button>
            <div id="statusMsg"></div>
        </form>
    </div>
</section>

<script>
    // Fetch Data from TiDB
    fetch('/api/profile').then(res => res.json()).then(data => {
        document.getElementById('name').innerText = data.name;
        document.getElementById('major').innerText = data.major;
        document.getElementById('bio').innerText = data.about_me;
        
        data.skills.split(',').forEach(s => {
            document.getElementById('skills').innerHTML += `<span class="skill-tag">${s.trim()}</span>`;
        });
        
        data.achievements.split('|').forEach(a => {
            document.getElementById('achievements').innerHTML += `<div class="milestone">${a.trim()}</div>`;
        });

        data.experience.split('|').forEach(e => {
            document.getElementById('experience').innerHTML += `<div class="milestone">${e.trim()}</div>`;
        });
    });

    // Handle Form with AJAX
    const form = document.getElementById('contactForm');
    const status = document.getElementById('statusMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        status.innerText = "Sending to TiDB...";
        status.style.color = "#fbbf24";

        try {
            const res = await fetch('/api/contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: form.name.value,
                    email: form.email.value,
                    message: form.message.value
                })
            });
            
            if (res.ok) {
                status.innerText = "✔ Success! Saved in TiDB.";
                status.style.color = "#4ade80";
                form.reset();
                setTimeout(() => { status.innerText = ""; }, 5000);
            } else {
                status.innerText = "✖ Server Error.";
                status.style.color = "#f87171";
            }
        } catch (err) {
            status.innerText = "✖ Connection Failed.";
            status.style.color = "#f87171";
        }
    });
</script>
</body>
</html>
